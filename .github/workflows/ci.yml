name: CI

on:
  push:
    branches: [main, 'wp/**']
  pull_request:
    branches: [main]

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: 1

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --all-features
      - name: test-no-default-features
        run: cargo test --workspace --no-default-features
      - name: wasm build
        run: cargo build -p cheetah-media-web-bindings --target wasm32-unknown-unknown --release
      - name: wasm build no-default-features
        run: cargo build -p cheetah-media-web-bindings --target wasm32-unknown-unknown --no-default-features
      - name: install cbindgen
        run: cargo install cbindgen --version 0.28.0 --locked
      - name: verify C header is up to date
        run: |
          cd crates/cheetah-media-c-bindings
          cbindgen --config cbindgen.toml --crate cheetah-media-c-bindings --output /tmp/cheetah_media.h
          diff -u include/cheetah_media.h /tmp/cheetah_media.h
      - name: install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny
        run: cargo deny check

  web:
    runs-on: ubuntu-latest
    env:
      WASM_PROFILE: dev
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Type check
        run: pnpm typecheck
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: Unit tests
        run: pnpm test
